[build]
  publish = "."
  command = "npm ci && npm run build"

# Disable deploy previews to save build credits
[context.deploy-preview]
  publish = "."
  command = "echo 'Skipping deploy preview build'"

[context.branch-deploy]
  publish = "."
  command = "echo 'Skipping branch deploy build'"

# Force HTTPS redirect
[[redirects]]
  from = "http://tucker-pippin-website.netlify.app/*"
  to = "https://tucker-pippin-website.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/tracker"
  to = "/tracker/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"
